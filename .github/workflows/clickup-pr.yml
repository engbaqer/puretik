name: ClickUp PR Notification

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify-clickup:
    runs-on: ubuntu-latest
    steps:
      - name: Extract ClickUp Task ID from PR Title
        id: extract_id
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          TASK_ID=$(echo "$TITLE" | grep -oP '#\K[a-zA-Z0-9]+' | head -n 1)
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT

      - name: Send Message - PR Opened
        if: github.event.action == 'opened' && steps.extract_id.outputs.task_id != ''
        run: |
          curl -X POST \
            "https://api.clickup.com/api/v2/task/${{ steps.extract_id.outputs.task_id }}/comment" \
            -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "comment_text": "🔔 **Pull Request Opened**\nDeveloper: ${{ github.actor }}\nLink: ${{ github.event.pull_request.html_url }}"
            }'

      - name: Send Message - PR Merged
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && steps.extract_id.outputs.task_id != ''
        run: |
          curl -X POST \
            "https://api.clickup.com/api/v2/task/${{ steps.extract_id.outputs.task_id }}/comment" \
            -H "Authorization: ${{ secrets.CLICKUP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "comment_text": "✅ **Pull Request Merged**\nThe code has been merged into the main branch.\nLink: ${{ github.event.pull_request.html_url }}"
            }'